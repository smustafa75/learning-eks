apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-test-pod
spec:
  containers:
  - name: app
    image: nginx:1.27
    volumeMounts:
    - mountPath: /data
      name: ebs-volume
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Hello from EBS volume! Written at $(date)" > /data/test.txt
      nginx -g 'daemon off;'
  volumes:
  - name: ebs-volume
    persistentVolumeClaim:
      claimName: ebs-claim
